name: Build AML (32-bit & 64-bit)

on:
  workflow_dispatch:   # tombol "Run workflow" manual di tab Actions
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AML repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build ARMPatch (both ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=ARMPatch/armpatch_src/Android.mk \
            NDK_APPLICATION_MK=ARMPatch/armpatch_src/Application.mk \
            NDK_DEBUG=0 -j$(nproc)

      - name: Build AML (both ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            NDK_DEBUG=0 -j$(nproc)

      - name: Upload compiled .so files
        uses: actions/upload-artifact@v4
        with:
          name: AML-libs
          path: |
            libs/armeabi-v7a/libAML.so
            libs/arm64-v8a/libAML.so
