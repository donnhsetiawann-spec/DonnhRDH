name: Build AML (32-bit & 64-bit) nee

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: build-aml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AML repo
        uses: actions/checkout@v4

      - name: Locate AML project folder
        run: |
          AML_DIR=""
          for f in $(find . -maxdepth 6 -type f -name "Android.mk" \
                     -not -path "*/ARMPatch/*" \
                     -not -path "*/template_of_mod/*" \
                     -not -path "*/AML_PrecompiledLibs/*"); do
            d=$(dirname "$f")
            if [ -f "$d/aml.cpp" ]; then
              AML_DIR="$d"
              break
            fi
          done
          if [ -z "$AML_DIR" ]; then
            echo "::error::Tidak ketemu Android.mk milik AML (yang bersebelahan dengan aml.cpp). Berikut semua Android.mk yang ada di repo:"
            find . -type f -name "Android.mk"
            exit 1
          fi
          echo "Ketemu folder project AML di: $AML_DIR"
          echo "AML_DIR=$AML_DIR" >> "$GITHUB_ENV"

      - name: Fetch ARMPatch source (with its nested submodule)
        run: |
          rm -rf "$AML_DIR/ARMPatch"
          git clone --recurse-submodules https://github.com/RusJJ/ARMPatch.git "$AML_DIR/ARMPatch"

      - name: Fetch AML_PrecompiledLibs
        run: |
          rm -rf "$AML_DIR/AML_PrecompiledLibs"
          git clone https://github.com/RusJJ/AML_PrecompiledLibs.git "$AML_DIR/AML_PrecompiledLibs"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build ARMPatch (both ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH="$AML_DIR" \
            APP_BUILD_SCRIPT="$AML_DIR/ARMPatch/armpatch_src/Android.mk" \
            NDK_APPLICATION_MK="$AML_DIR/ARMPatch/armpatch_src/Application.mk" \
            NDK_DEBUG=0 -j$(nproc)

      - name: Build AML (both ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH="$AML_DIR" \
            APP_BUILD_SCRIPT="$AML_DIR/Android.mk" \
            NDK_APPLICATION_MK="$AML_DIR/Application.mk" \
            NDK_DEBUG=0 -j$(nproc)

      - name: Upload compiled .so files
        uses: actions/upload-artifact@v4
        with:
          name: AML-libs
          path: |
            ${{ env.AML_DIR }}/libs/armeabi-v7a/libAML.so
            ${{ env.AML_DIR }}/libs/arm64-v8a/libAML.so
