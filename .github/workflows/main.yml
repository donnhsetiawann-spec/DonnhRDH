name: Build AML (32-bit & 64-bit)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: build-aml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AML repo
        uses: actions/checkout@v4

      - name: Fetch ARMPatch source (with its nested submodule)
        run: |
          rm -rf ARMPatch
          git clone --recurse-submodules https://github.com/RusJJ/ARMPatch.git ARMPatch

      - name: Fetch AML_PrecompiledLibs
        run: |
          rm -rf AML_PrecompiledLibs
          git clone https://github.com/RusJJ/AML_PrecompiledLibs.git AML_PrecompiledLibs

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build ARMPatch (both ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=ARMPatch/armpatch_src/Android.mk \
            NDK_APPLICATION_MK=ARMPatch/armpatch_src/Application.mk \
            NDK_DEBUG=0 -j$(nproc)

      - name: Build AML (both ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            NDK_DEBUG=0 -j$(nproc)

      - name: Upload compiled .so files
        uses: actions/upload-artifact@v4
        with:
          name: AML-libs
          path: |
            libs/armeabi-v7a/libAML.so
            libs/arm64-v8a/libAML.so
